<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaglerLauncher - Ultra Enhanced</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00bfff;
            --secondary: #1a73e8;
            --accent: #8a2be2;
            --bg-dark: #050508;
            --error: #ff3e3e;
        }

        /* Page styling */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: var(--bg-dark);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* Complex layered background */
        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        /* Slow flashing & moving background effect */
        .bg-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(26, 115, 232, 0.15), transparent);
            animation: slowFlash 10s infinite alternate ease-in-out;
            z-index: -2;
        }

        @keyframes slowFlash {
            0% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.3); background-color: rgba(138, 43, 226, 0.1); }
            100% { opacity: 0.4; transform: scale(1); }
        }

        /* Multiple animated background orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: drift var(--duration) infinite alternate ease-in-out;
            z-index: -1;
        }

        .blue-orb { background: radial-gradient(circle, var(--primary), transparent 70%); }
        .purple-orb { background: radial-gradient(circle, var(--accent), transparent 70%); }

        /* Specific Orb Placements */
        .orb-1 { width: 50vw; height: 50vw; top: -10%; left: -10%; --duration: 20s; }
        .orb-2 { width: 40vw; height: 40vw; bottom: -10%; right: -10%; --duration: 25s; animation-delay: -5s; }
        .orb-3 { width: 35vw; height: 35vw; top: 20%; right: 10%; --duration: 18s; animation-delay: -2s; opacity: 0.3; }
        .orb-4 { width: 45vw; height: 45vw; bottom: 10%; left: 15%; --duration: 30s; animation-delay: -10s; opacity: 0.25; }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(15%, 15%) rotate(20deg) scale(1.2); }
        }

        /* Title with moving gradient */
        h1 {
            font-size: 4.5em;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 900;
            background: linear-gradient(
                to right, 
                #fff 20%, 
                var(--primary) 40%, 
                var(--accent) 60%, 
                #fff 80%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 6s linear infinite;
            text-shadow: 0 10px 40px rgba(0, 191, 255, 0.2);
            z-index: 1;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Glassmorphism Container */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 45px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 340px;
        }

        /* High-Impact 3D Buttons */
        .btn {
            background: linear-gradient(145deg, var(--secondary), #0a3678);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            padding: 18px 24px;
            font-size: 1.15em;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            text-align: center;
            position: relative;
            transform-style: preserve-3d;
            transition: 
                transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                box-shadow 0.4s ease, 
                background 0.4s ease,
                letter-spacing 0.3s ease;
            animation: idleWiggle 5s infinite ease-in-out;
        }

        @keyframes idleWiggle {
            0%, 100% { transform: translateY(0) rotate(0.3deg); }
            50% { transform: translateY(-3px) rotate(-0.3deg); }
        }

        /* Scale Up & Pulse Effect on Hover */
        .btn:hover {
            animation: none;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            box-shadow: 0 20px 40px rgba(0, 191, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.12) translateY(-5px); 
            letter-spacing: 1px;
        }

        .btn:active {
            transform: scale(0.98) translateZ(0);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
        }

        /* Loading overlay */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 3, 6, 0.96);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 999;
        }

        #loadingOverlay p {
            margin-top: 25px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
        }

        .loader {
            border: 5px solid rgba(255, 255, 255, 0.05);
            border-top: 5px solid var(--primary);
            border-bottom: 5px solid var(--accent);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        /* Custom Popup Modal Styles */
        #customPopup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2000;
        }

        .popup-content {
            background: linear-gradient(145deg, #1a1a25, #0a0a0f);
            border: 2px solid var(--error);
            border-radius: 20px;
            padding: 30px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 62, 62, 0.3);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #customPopup.show {
            visibility: visible;
            opacity: 1;
        }

        #customPopup.show .popup-content {
            transform: scale(1);
        }

        .popup-icon {
            font-size: 3em;
            color: var(--error);
            margin-bottom: 15px;
        }

        .popup-title {
            font-size: 1.5em;
            font-weight: 900;
            color: #fff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .popup-text {
            color: #ccc;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .popup-close {
            background: var(--error);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-close:hover {
            background: #ff5e5e;
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="bg-flash"></div>
        <!-- Clustered Blue and Purple Orbs -->
        <div class="orb blue-orb orb-1"></div>
        <div class="orb purple-orb orb-2"></div>
        <div class="orb blue-orb orb-3"></div>
        <div class="orb purple-orb orb-4"></div>
    </div>

    <h1>EaglerLauncher</h1>

    <div class="glass-panel">
        <div class="button-container" id="buttonContainer"></div>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay">
        <div class="loader"></div>
        <p>INITIALIZING...</p>
    </div>

    <!-- Custom Popup Notification -->
    <div id="customPopup">
        <div class="popup-content">
            <div class="popup-icon">⚠️</div>
            <div class="popup-title">Launch Blocked</div>
            <div class="popup-text">Your browser blocked the game from opening. Please enable popups for this site and try again!</div>
            <button class="popup-close" onclick="closePopup()">GOT IT</button>
        </div>
    </div>

    <script>
        const prefix = "https://cdn.jsdelivr.net/gh/NewJs26/cdn-files@main/";

        const buttons = [
            { name: "Wurst 1.8 WASM (Hack Client)", file: "Wurst-EaglercraftX.html" },
            { name: "Eaglercraft 1.8 JS", file: "Eaglercraft_1.8_js.html" },
            { name: "Eaglercraft 1.8 WASM", file: "Eaglercraft_1.8.html" },
            { name: "Eaglercraft 1.12 WASM", file: "Eaglercraft_1.12.html" }
        ];

        const container = document.getElementById('buttonContainer');
        const loading = document.getElementById('loadingOverlay');
        const customPopup = document.getElementById('customPopup');

        function showPopup() {
            customPopup.classList.add('show');
        }

        function closePopup() {
            customPopup.classList.remove('show');
        }

        function createButton(btn) {
            const button = document.createElement('button');
            button.className = 'btn';
            button.innerText = btn.name;
            
            button.onclick = async () => {
    try {
        loading.style.visibility = 'visible';
        loading.style.opacity = '1';

        // Always fetch latest
        const url = prefix + btn.file + "?v=" + Date.now();
        const res = await fetch(url);
        if (!res.ok) throw new Error("Network response was not ok");
        const html = await res.text();

        const win = window.open(url, "_blank"); // pass URL so future reloads are possible
        if (!win) {
            showPopup();
            return;
        }
        win.document.open();
        win.document.write(html);
        win.document.close();

    } catch (err) {
        console.error(err);
        // ... error handling
    } finally {
        loading.style.opacity = '0';
        setTimeout(() => loading.style.visibility = 'hidden', 400);
    }
};
            return button;
        }

        // Add all buttons
        buttons.forEach(b => container.appendChild(createButton(b)));

        // Interactive 3D Tilt Effect
        document.addEventListener('mousemove', (e) => {
            const btns = document.querySelectorAll('.btn');
            btns.forEach(btn => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                
                const distance = Math.sqrt(x*x + y*y);
                const maxDistance = 350;

                if (distance < maxDistance) {
                    btn.style.animation = 'none';
                    const intensity = (maxDistance - distance) / maxDistance;
                    const rotateX = (-y / 8) * intensity;
                    const rotateY = (x / 8) * intensity;
                    
                    const scale = distance < 100 ? 1.12 : 1 + (0.05 * intensity);
                    btn.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(${scale})`;
                } else {
                    btn.style.animation = 'idleWiggle 5s infinite ease-in-out';
                    btn.style.transform = '';
                }
            });
        });
    </script>

</body>
</html>
