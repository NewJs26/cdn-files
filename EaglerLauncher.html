<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaglerLauncher</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700&display=swap" rel="stylesheet">

<style>
/* Page styling */
body {
    margin: 0;
    padding: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #121212, #1f1f2a);
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

h1 {
    font-size: 3em;
    margin-bottom: 50px;
    text-shadow: 3px 3px 10px rgba(0,0,0,0.7);
    color: #00bfff;
}

/* Button container */
.button-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 300px;
}

/* 3D Buttons with shading */
.btn {
    background: linear-gradient(145deg, #1a73e8, #1356b3);
    border: none;
    border-radius: 15px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.4), inset 0 -2px 4px rgba(255,255,255,0.1);
    padding: 15px 20px;
    font-size: 1.2em;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
    text-align: center;
    perspective: 1000px;
}

.btn:hover {
    transform: translateY(-5px) rotateX(4deg);
    box-shadow: 0 12px 25px rgba(0,0,0,0.6), inset 0 -2px 4px rgba(255,255,255,0.15);
    background: linear-gradient(145deg, #2a8bf4, #1a63c2);
}

.btn:active {
    transform: translateY(2px) rotateX(0deg);
    box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset 0 -1px 2px rgba(255,255,255,0.1);
}

/* Loading overlay */
#loadingOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(18,18,18,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 999;
}

/* Rotating circle */
.loader {
    border: 6px solid #1f1f2a;
    border-top: 6px solid #00bfff;
    border-radius: 50%;
    width: 70px;
    height: 70px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(360deg);}
}
</style>
</head>
<body>

<h1>EaglerLauncher</h1>

<div class="button-container" id="buttonContainer"></div>

<!-- Loading overlay -->
<div id="loadingOverlay">
    <div class="loader"></div>
</div>

<script>
// CDN prefix
const prefix = "https://cdn.jsdelivr.net/gh/NewJs26/cdn-files@main/";

// Buttons array (easy to add more)
const buttons = [
    { name: "Wurst 1.8", file: "Wurst-EaglercraftX.html" },
    { name: "Eaglercraft 1.8", file: "Eaglercraft_1.8.html" },
    { name: "Eaglercraft 1.12", file: "Eaglercraft_1.12.html" }
];

const container = document.getElementById('buttonContainer');
const loading = document.getElementById('loadingOverlay');

// Function to create a button element
function createButton(btn) {
    const button = document.createElement('button');
    button.className = 'btn';
    button.innerText = btn.name;
    button.onclick = async () => {
        try {
            // Show loader
            loading.style.visibility = 'visible';
            loading.style.opacity = '1';

            const res = await fetch(prefix + btn.file);
            const html = await res.text();

            const win = window.open("about:blank", "_blank");
            win.document.open();
            win.document.write(html);
            win.document.close();

        } catch (err) {
            alert("Failed to load: " + btn.name);
            console.error(err);
        } finally {
            // Hide loader
            loading.style.opacity = '0';
            setTimeout(() => loading.style.visibility = 'hidden', 300);
        }
    };
    return button;
}

// Add all buttons
buttons.forEach(b => container.appendChild(createButton(b)));
</script>

</body>
</html>
